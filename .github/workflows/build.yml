name: Build Android APK

# ============================================================
# GitHub Actions 工作流配置
# 
# 功能：自动编译 Android APK
# 
# 触发方式：
#   - push 到 main/master 分支时自动触发
#   - pull request 到 main/master 分支时自动触发
#   - 也可手动在 Actions 页面触发 (workflow_dispatch)
#
# Release 发布设置：
#   默认不自动发布 Release。如需开启，将下方的
#   ENABLE_RELEASE 改为 true 即可。
#   开启后，每次 push 到 main/master 时，会自动创建
#   一个 GitHub Release 并上传编译好的 APK。
# ============================================================

# ==================== 是否自动发布 Release ====================
# 改为 true 则开启自动发布 Release，false 则仅编译不发布
env:
  ENABLE_RELEASE: false
# =============================================================

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # ====== 自动发布 Release（仅当 ENABLE_RELEASE=true 时执行）======
      - name: Create Release and Upload APK
        if: env.ENABLE_RELEASE == 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: "Nightly Build - ${{ github.ref_name }}"
          tag_name: "nightly-${{ github.run_number }}"
          body: |
            ## 自动构建版本

            - 分支: `${{ github.ref_name }}`
            - 提交: `${{ github.sha }}`
            - 构建编号: `${{ github.run_number }}`

            ### 下载
            - `app-debug.apk` — Debug 版本
            - `app-release-unsigned.apk` — Release 未签名版本
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
